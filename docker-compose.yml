services:
  # Web UI: docker compose up web
  web:
    build:
      context: .
      target: web
    ports:
      - "8080:8000"
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./src:/app/src
      - ./samples:/app/samples
      - ~/.config/gcloud/application_default_credentials.json:/home/agency/.config/gcloud/application_default_credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/home/agency/.config/gcloud/application_default_credentials.json
    restart: unless-stopped

  # Run CLI commands: docker compose run --rm cli prd generate -t "Build a todo app"
  cli:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./src:/app/src
    entrypoint: ["ai-agency"]

  # Run tests: docker compose run --rm test
  test:
    build: .
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    entrypoint: ["pytest"]
    command: ["-v"]

  # Run linter: docker compose run --rm lint
  lint:
    build: .
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    entrypoint: ["ruff"]
    command: ["check", "src/", "tests/"]
